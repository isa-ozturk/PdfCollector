name: Build and Release PdfCollector

on:
  workflow_run:
    workflows: ["Generate Changelog"]
    types:
      - completed

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Read version from .version file
        run: |
          $tag = (Get-Content .version).Trim()
          $num = $tag.TrimStart("v")
          echo "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
          echo "RELEASE_VER=$num" >> $env:GITHUB_ENV

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Update AssemblyVersion in csproj
        run: |
          $csproj = "src\PdfCollector\PdfCollector.csproj"
          $v = "${{ env.RELEASE_VER }}"
          (Get-Content $csproj) `
            -replace '<AssemblyVersion>.*?</AssemblyVersion>', "<AssemblyVersion>$v.0</AssemblyVersion>" `
            -replace '<FileVersion>.*?</FileVersion>',         "<FileVersion>$v.0</FileVersion>" |
            Set-Content $csproj

      - name: Restore NuGet packages
        run: msbuild src\PdfCollector\PdfCollector.csproj /t:Restore /p:Configuration=Release

      - name: Build PdfCollector
        run: msbuild src\PdfCollector\PdfCollector.csproj /p:Configuration=Release /p:Platform="Any CPU"

      - name: Verify EXE exists
        run: |
          if (Test-Path "src\PdfCollector\bin\Release\net472\PdfCollector.exe") {
            Write-Host "✅ EXE bulundu"
          } else {
            Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName
            Write-Error "❌ EXE bulunamadı"
          }

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.RELEASE_TAG }} `
            --title "${{ env.RELEASE_TAG }}" `
            --notes-file CHANGELOG.md `
            "src\PdfCollector\bin\Release\net472\PdfCollector.exe"
